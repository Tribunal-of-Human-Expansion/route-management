apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-management
  namespace: default
  labels:
    app: route-management
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: route-management
  template:
    metadata:
      labels:
        app: route-management
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: booking-service
      imagePullSecrets:
        - name: ghcr-pull
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: route-management-kv-secrets
      containers:
        - name: route-management
          image: ghcr.io/eshandas5/route-management:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          volumeMounts:
            - name: keyvault-secrets
              mountPath: /mnt/secrets
              readOnly: true
          envFrom:
            - configMapRef:
                name: route-management-config
          env:
            - name: ROUTE_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: route-management-kv-synced
                  key: ROUTE_DATASOURCE_URL
            - name: ROUTE_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: route-management-kv-synced
                  key: ROUTE_DATASOURCE_USERNAME
            - name: ROUTE_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: route-management-kv-synced
                  key: ROUTE_DATASOURCE_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: route-management-kv-synced
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: route-management-kv-synced
                  key: SPRING_DATA_REDIS_PORT
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: route-management-kv-synced
                  key: SPRING_DATA_REDIS_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: route-management-svc
  namespace: default
spec:
  selector:
    app: route-management
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8083
  type: ClusterIP
